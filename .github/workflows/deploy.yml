name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: portfolio-vue/package-lock.json

      - name: Install dependencies
        working-directory: portfolio-vue
        run: npm ci

      - name: Build
        working-directory: portfolio-vue
        run: npm run build

      - name: Copy dist to docs/
        run: |
          rm -rf docs
          cp -r portfolio-vue/dist docs
          touch docs/.nojekyll

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Deploy: update docs/ from Vue build"
          git push
